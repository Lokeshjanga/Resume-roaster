<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Roaster 🔥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --bg-card2: #161616;
      --fire: #ff4500;
      --fire-dim: #cc3700;
      --orange: #ff6b00;
      --text: #e8e8e8;
      --muted: #888;
      --border: #222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
      border-bottom: 1px solid #1a1a1a;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 4px;
      color: var(--fire);
      text-shadow: 0 0 40px rgba(255,69,0,0.5), 0 0 80px rgba(255,69,0,0.2);
      line-height: 1;
    }
    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.6rem;
      letter-spacing: 1px;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--fire);
      color: #fff;
      font-weight: 500;
    }
    .tab-btn:not(.active):hover { color: var(--text); }

    /* ── INPUT PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    textarea {
      width: 100%;
      height: 280px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    textarea:focus { border-color: var(--fire); }
    textarea::placeholder { color: #444; }

    /* ── DROP ZONE ── */
    .drop-zone {
      border: 2px dashed var(--fire);
      border-radius: 8px;
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover { background: rgba(255,69,0,0.06); }
    .drop-zone .dz-icon { font-size: 3rem; }
    .drop-zone .dz-text { color: var(--muted); font-size: 0.82rem; text-align: center; line-height: 1.8; }
    .drop-zone .dz-text span { color: var(--fire); cursor: pointer; text-decoration: underline; }
    .drop-zone .dz-filename {
      color: var(--fire);
      font-size: 0.8rem;
      display: none;
      position: absolute;
      bottom: 1rem;
    }
    #pdf-input { display: none; }

    /* ── CTA BUTTON ── */
    .roast-btn {
      width: 100%;
      margin-top: 1.2rem;
      padding: 1rem;
      background: var(--fire);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .roast-btn:hover { background: var(--fire-dim); transform: scale(1.02); }
    .roast-btn:active { transform: scale(0.98); }

    /* ── LOADER ── */
    #loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 4rem 1rem;
      text-align: center;
    }
    .flame-spinner {
      font-size: 4rem;
      animation: flamePulse 0.7s ease-in-out infinite alternate;
    }
    @keyframes flamePulse {
      from { transform: scale(1) rotate(-3deg); filter: brightness(1); }
      to   { transform: scale(1.2) rotate(3deg); filter: brightness(1.4); }
    }
    #loader-msg {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 1px;
      min-height: 1.2em;
    }

    /* ── RESULTS ── */
    #results { display: none; }

    .score-card {
      text-align: center;
      padding: 2.5rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1.5rem;
      animation: fadeSlideUp 0.5s ease forwards;
    }
    .score-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 4px;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .score-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 20vw, 9rem);
      line-height: 1;
      transition: color 0.5s;
    }
    .score-denom {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--muted);
    }
    .score-red    { color: #ff2020; }
    .score-orange { color: var(--orange); }
    .score-green  { color: #00cc66; }

    .verdict-card {
      text-align: center;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      animation: fadeSlideUp 0.5s ease 0.1s both;
    }
    .verdict-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      color: var(--fire);
      font-style: italic;
      letter-spacing: 1px;
    }
    .verdict-text::before { content: '"'; }
    .verdict-text::after  { content: '"'; }

    .roast-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--fire);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      animation: fadeSlideUp 0.5s ease 0.2s both;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: var(--fire);
      margin-bottom: 1rem;
    }
    .roast-text {
      font-size: 0.84rem;
      line-height: 1.9;
      color: #ccc;
      white-space: pre-wrap;
    }

    /* ── BURNS ── */
    .burns-section { margin-bottom: 1.5rem; }
    .burns-section .section-title { margin-bottom: 0.8rem; }
    .burn-card {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.6rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      opacity: 0;
      animation: fadeSlideUp 0.4s ease forwards;
    }
    .burn-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: var(--fire);
      min-width: 1.6rem;
      line-height: 1.4;
    }
    .burn-text { font-size: 0.82rem; color: #bbb; line-height: 1.7; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── ROAST AGAIN ── */
    .again-btn {
      width: 100%;
      padding: 0.9rem;
      background: transparent;
      color: var(--fire);
      border: 2px solid var(--fire);
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 2rem;
    }
    .again-btn:hover { background: var(--fire); color: #fff; }

    /* ── ERROR TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #8b0000;
      color: #fff;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      transition: transform 0.3s ease;
      z-index: 999;
      max-width: 90vw;
      text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 1px;
      border-top: 1px solid #111;
    }
  </style>
</head>
<body>

  <header>
    <h1>RESUME ROASTER 🔥</h1>
    <p>"We read it so your future employer doesn't have to"</p>
  </header>

  <main>

    <!-- INPUT SECTION -->
    <section id="input-section">
      <div class="tabs">
        <button class="tab-btn active" data-tab="text">📄 Paste Text</button>
        <button class="tab-btn" data-tab="pdf">📎 Upload PDF</button>
      </div>

      <div id="panel-text" class="panel active">
        <textarea id="resume-text" placeholder="Paste your resume here...&#10;&#10;John Doe&#10;john@email.com | linkedin.com/in/johndoe&#10;&#10;EXPERIENCE&#10;Senior Synergy Facilitator at Startup Inc..."></textarea>
      </div>

      <div id="panel-pdf" class="panel">
        <div class="drop-zone" id="drop-zone">
          <span class="dz-icon">📄</span>
          <div class="dz-text">
            Drag & drop your PDF here<br />
            or <span id="dz-browse">browse files</span>
          </div>
          <span class="dz-filename" id="dz-filename"></span>
          <input type="file" id="pdf-input" accept=".pdf" />
        </div>
      </div>

      <button class="roast-btn" id="roast-btn">ROAST ME 🔥</button>
    </section>

    <!-- LOADER -->
    <section id="loader">
      <div class="flame-spinner">🔥</div>
      <div id="loader-msg">Summoning Gordon Ramsay...</div>
    </section>

    <!-- RESULTS -->
    <section id="results">
      <div class="score-card">
        <div class="score-label">YOUR RESUME SCORED</div>
        <div>
          <span class="score-number" id="score-display">0</span>
          <span class="score-denom">/10</span>
        </div>
      </div>

      <div class="verdict-card">
        <div class="verdict-text" id="verdict-text"></div>
      </div>

      <div class="roast-card">
        <div class="section-title">🔥 THE ROAST</div>
        <div class="roast-text" id="roast-text"></div>
      </div>

      <div class="burns-section">
        <div class="section-title">💀 TOP BURNS</div>
        <div id="burns-list"></div>
      </div>

      <button class="again-btn" id="again-btn">🔥 ROAST ANOTHER ONE</button>
    </section>

  </main>

  <footer>Built with 🔥 and zero mercy</footer>

  <div id="toast"></div>

  <script>
    const API_URL = 'https://resume-roasterr.onrender.com'; // replace with your Railway URL

    // ── State ──
    let activeTab = 'text';
    let selectedFile = null;

    // ── Elements ──
    const inputSection = document.getElementById('input-section');
    const loader       = document.getElementById('loader');
    const results      = document.getElementById('results');
    const loaderMsg    = document.getElementById('loader-msg');
    const roastBtn     = document.getElementById('roast-btn');
    const againBtn     = document.getElementById('again-btn');
    const resumeText   = document.getElementById('resume-text');
    const pdfInput     = document.getElementById('pdf-input');
    const dropZone     = document.getElementById('drop-zone');
    const dzFilename   = document.getElementById('dz-filename');
    const toast        = document.getElementById('toast');

    // ── Tab switching ──
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${activeTab}`).classList.add('active');
      });
    });

    // ── PDF drop zone ──
    document.getElementById('dz-browse').addEventListener('click', () => pdfInput.click());
    dropZone.addEventListener('click', () => pdfInput.click());

    pdfInput.addEventListener('change', () => {
      if (pdfInput.files[0]) {
        selectedFile = pdfInput.files[0];
        dzFilename.textContent = selectedFile.name;
        dzFilename.style.display = 'block';
        dropZone.querySelector('.dz-icon').textContent = '✅';
      }
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        selectedFile = file;
        dzFilename.textContent = file.name;
        dzFilename.style.display = 'block';
        dropZone.querySelector('.dz-icon').textContent = '✅';
      } else {
        showToast('Only PDF files are accepted.');
      }
    });

    // ── Loading messages ──
    const loadingMsgs = [
      'Summoning Gordon Ramsay...',
      'Detecting buzzwords...',
      'Calculating career damage...',
      'Finding every red flag...',
      'Consulting HR from hell...',
      'Measuring your mediocrity...',
      'Translating corporate speak...',
    ];
    let msgInterval = null;
    function startLoadingMessages() {
      let i = 0;
      loaderMsg.textContent = loadingMsgs[0];
      msgInterval = setInterval(() => {
        i = (i + 1) % loadingMsgs.length;
        loaderMsg.textContent = loadingMsgs[i];
      }, 2000);
    }
    function stopLoadingMessages() {
      clearInterval(msgInterval);
      msgInterval = null;
    }

    // ── Toast ──
    let toastTimeout = null;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // ── Score animation ──
    function animateScore(target) {
      const el = document.getElementById('score-display');
      el.className = 'score-number';
      if (target <= 4)      el.classList.add('score-red');
      else if (target <= 7) el.classList.add('score-orange');
      else                  el.classList.add('score-green');

      let current = 0;
      const duration = 1500;
      const steps = 60;
      const increment = target / steps;
      const delay = duration / steps;

      const timer = setInterval(() => {
        current += increment;
        if (current >= target) {
          current = target;
          clearInterval(timer);
        }
        el.textContent = Math.floor(current);
      }, delay);
    }

    // ── Render burns ──
    function renderBurns(burns) {
      const list = document.getElementById('burns-list');
      list.innerHTML = '';
      burns.forEach((burn, i) => {
        setTimeout(() => {
          const card = document.createElement('div');
          card.className = 'burn-card';
          card.style.animationDelay = '0ms';
          card.innerHTML = `
            <span class="burn-num">${i + 1}</span>
            <span class="burn-text">${escapeHtml(burn)}</span>
          `;
          list.appendChild(card);
        }, i * 150);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Show results ──
    function showResults(data) {
      document.getElementById('roast-text').textContent  = data.roast;
      document.getElementById('verdict-text').textContent = data.verdict;
      renderBurns(data.burns);

      loader.style.display = 'none';
      results.style.display = 'block';

      animateScore(data.score);
    }

    // ── Main roast handler ──
    roastBtn.addEventListener('click', async () => {
      if (activeTab === 'text') {
        const text = resumeText.value.trim();
        if (!text || text.length < 50) {
          showToast('Please paste your resume (at least 50 characters).');
          return;
        }
        inputSection.style.display = 'none';
        loader.style.display = 'flex';
        startLoadingMessages();

        try {
          const res = await fetch(`${API_URL}/roast`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ resumeText: text }),
          });
          const data = await res.json();
          stopLoadingMessages();
          if (!res.ok) { showToast(data.error || 'Something went wrong.'); resetToInput(); return; }
          showResults(data);
        } catch (err) {
          stopLoadingMessages();
          showToast('Could not reach the backend. Is the server running on port 3001?');
          resetToInput();
        }

      } else {
        if (!selectedFile) {
          showToast('Please select a PDF file first.');
          return;
        }
        inputSection.style.display = 'none';
        loader.style.display = 'flex';
        startLoadingMessages();

        const formData = new FormData();
        formData.append('resume', selectedFile);

        try {
          const res = await fetch(`${API_URL}/roast-pdf`, {
            method: 'POST',
            body: formData,
          });
          const data = await res.json();
          stopLoadingMessages();
          if (!res.ok) { showToast(data.error || 'Something went wrong.'); resetToInput(); return; }
          showResults(data);
        } catch (err) {
          stopLoadingMessages();
          showToast('Could not reach the backend. Is the server running on port 3001?');
          resetToInput();
        }
      }
    });

    // ── Reset ──
    function resetToInput() {
      loader.style.display = 'none';
      results.style.display = 'none';
      inputSection.style.display = 'block';
    }

    againBtn.addEventListener('click', () => {
      resumeText.value = '';
      selectedFile = null;
      dzFilename.style.display = 'none';
      dropZone.querySelector('.dz-icon').textContent = '📄';
      document.getElementById('burns-list').innerHTML = '';
      resetToInput();
    });
  </script>
</body>
</html>
